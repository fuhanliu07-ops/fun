        <h2 data-zh="行业资产周转率分布统计" data-en="Asset Turnover Distribution">行业资产周转率分布统计</h2>
        <div lang-zh>
            <p><strong>资产周转率 (Asset Turnover)</strong> 是衡量能源企业营运效率的核心 KPI。本界面利用箱线图展示全行业的分散程度。中间的“箱体”代表了 50% 企业集中的水平。通过观察离群点（Outliers），我们可以发现那些由于卓越运营或极简模式脱颖而出的效率标杆。年份间的对比则反映了行业整体数字转型或资产更新的成效。</p>

        <script>
            function toggleLang() {
                const isZh = document.body.classList.contains('lang-zh-active');
                document.body.classList.toggle('lang-zh-active', !isZh);
                document.querySelectorAll('[data-zh]').forEach(el => {
                    el.innerText = el.getAttribute(isZh ? 'data-en' : 'data-zh');
                });
                document.querySelectorAll('[lang-zh]').forEach(el => el.style.display = isZh ? 'none' : 'block');
                document.querySelectorAll('[lang-en]').forEach(el => el.style.display = isZh ? 'block' : 'none');
            }
        </script>
