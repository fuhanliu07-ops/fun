        <h2 data-zh="净利润率 (Net Margin) 周期演变" data-en="Profitability Cycles">净利润率 (Net Margin) 周期演变</h2>
        <div lang-zh>
            <p>能源行业具有显著的周期性特征。本界面通过追踪<strong>头部前十强（按营收计）</strong>的净利润率变动轨迹，旨在揭示宏观经济周期、能源价格波动与企业成本控制能力之间的关联。分析师应关注斜率的突变点，这通常预示着企业内部结构调整或行业供给侧的剧变。</p>
